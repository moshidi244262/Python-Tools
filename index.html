        const grid = document.getElementById('tools-grid');
        
        // 渲染主页卡片
        toolsData.forEach(tool => {
            const tagsHtml = tool.tags.map(tag => 
                `<span class="px-2 py-1 text-xs rounded bg-slate-800 text-slate-300 border border-slate-700">${tag}</span>`
            ).join('');

            const encodedFolder = encodeURIComponent(tool.sourceFolder);
            const encodedFile = encodeURIComponent(tool.mainFile);
            
            const sourceUrl = `${REPO_BASE}/${encodedFolder}`;
            const downloadUrl = `${DOWNLOAD_BASE}/${encodedFolder}/${encodedFile}`;

            const card = document.createElement('div');
            card.className = 'glass-card rounded-2xl p-6 flex flex-col h-full relative overflow-hidden group';
            
            // 背景光晕
            const glow = document.createElement('div');
            glow.className = 'absolute -right-10 -top-10 w-32 h-32 bg-primary/10 rounded-full blur-3xl group-hover:bg-primary/20 transition duration-500';

            card.innerHTML += `
                <!-- 新增：详细介绍按钮 (绝对定位在右上角) -->
                <button onclick="openModal('${tool.id}')" class="absolute top-4 right-4 z-20 text-xs font-medium px-3 py-1.5 rounded-full bg-slate-800/80 text-blue-300 hover:bg-blue-600 hover:text-white border border-slate-600 transition-all duration-300 shadow-sm flex items-center group/btn">

        // 复制命令功能函数
        function copyInstallCmd(btnElement, cmdText) {
            const textArea = document.createElement("textarea");
            textArea.value = cmdText;
            textArea.style.position = "fixed";
            textArea.style.top = "0";
            textArea.style.left = "0";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                // 成功后按钮交互反馈
                const originalHtml = btnElement.innerHTML;
                btnElement.innerHTML = '<i class="fa-solid fa-check mr-1.5"></i>已复制';
                btnElement.classList.replace('text-slate-400', 'text-emerald-400');
                btnElement.classList.replace('hover:text-white', 'hover:text-emerald-300');
                
                setTimeout(() => {
                    btnElement.innerHTML = originalHtml;
                    btnElement.classList.replace('text-emerald-400', 'text-slate-400');
                    btnElement.classList.replace('hover:text-emerald-300', 'hover:text-white');
                }, 2000);
            } catch (err) {
                console.error('复制失败', err);
            }
            document.body.removeChild(textArea);
        }

        // 模态框逻辑
        const modal = document.getElementById('detail-modal');
        const modalContent = document.getElementById('modal-content');
        const modalBody = document.getElementById('modal-body');

            const tool = toolsData.find(t => t.id === toolId);
            if(!tool) return;

            const tagsHtml = tool.tags.map(tag =>
                `<span class="px-2.5 py-1 text-xs font-medium rounded-md bg-slate-700/50 text-slate-300 border border-slate-600 shadow-sm">${tag}</span>`
            ).join('');

            let featuresHtml = '';
            if (tool.features && tool.features.length > 0) {
                featuresHtml = `
                    <div class="mt-6">
                        <h4 class="text-lg font-semibold text-white mb-3 flex items-center">
                            <i class="fa-solid fa-wand-magic-sparkles text-yellow-400 mr-2"></i>核心特性
                        </h4>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                            ${tool.features.map(f => `
                                <div class="flex items-start bg-slate-900/30 p-3 rounded-xl border border-slate-700/50">
                                    <i class="fa-solid fa-check text-emerald-400 mt-1 mr-3 text-sm shrink-0"></i>
                                    <span class="text-slate-300 text-sm leading-snug">${f}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            // 新增：构建运行库依赖 HTML
            let installHtml = '';
            if (tool.installCmd) {
                installHtml = `
                    <div class="mt-6">
                        <h4 class="text-lg font-semibold text-white mb-3 flex items-center">
                            <i class="fa-solid fa-box-archive text-emerald-400 mr-2"></i>运行库依赖
                        </h4>
                        <div class="bg-slate-900/80 rounded-xl border border-slate-700/50 p-4">
                            <div class="flex items-center justify-between bg-slate-950/50 rounded-lg p-3 border border-slate-800">
                                <code class="text-emerald-300 font-mono text-sm break-all">${tool.installCmd}</code>
                                <button onclick="copyInstallCmd(this, '${tool.installCmd}')" class="text-slate-400 hover:text-white transition-colors flex items-center text-sm ml-4 shrink-0 bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded-md border border-slate-600">
                                    <i class="fa-regular fa-copy mr-1.5"></i>复制
                                </button>
                            </div>
                            <p class="text-slate-400 text-xs mt-3 flex items-start leading-relaxed">
                                <i class="fa-solid fa-circle-info text-blue-400 mt-0.5 mr-1.5 shrink-0"></i>
                                <span>温馨提示：请在系统终端 (CMD 或 Terminal) 中运行上述命令安装依赖。<br/>若该运行库已安装则可以跳过，即使重复安装也没问题（系统会自动提示已满足依赖条件）。对于 FFmpeg 工具依赖，请确保您已经将其添加至系统环境变量中。</span>
                            </p>
                        </div>
                    </div>
                `;
            }

            // 构建图片预览 HTML
            let imageHtml = '';
            if (tool.imageUrl) {
                imageHtml = `
                    <div class="mt-6">
                        <h4 class="text-lg font-semibold text-white mb-3 flex items-center">
                            <i class="fa-solid fa-image text-pink-400 mr-2"></i>界面预览
                        </h4>
                        <div class="relative group rounded-xl overflow-hidden border border-slate-700/50 cursor-pointer bg-slate-900/80 p-2" onclick="openLightbox('${tool.imageUrl}')">

                            <div class="absolute inset-0 bg-slate-900/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center rounded-xl">
                                <span class="bg-slate-800/90 text-white px-4 py-2 rounded-lg backdrop-blur-sm flex items-center shadow-lg"><i class="fa-solid fa-magnifying-glass-plus mr-2"></i>点击全屏查看大图</span>
                            </div>
                        </div>
                    </div>
                `;
            }

            const encodedFolder = encodeURIComponent(tool.sourceFolder);
            const encodedFile = encodeURIComponent(tool.mainFile);
            const sourceUrl = `${REPO_BASE}/${encodedFolder}`;
            const downloadUrl = `${DOWNLOAD_BASE}/${encodedFolder}/${encodedFile}`;

            // 填充模态框内容
            modalBody.innerHTML = `
                <!-- 头部 -->
                <div class="flex items-start space-x-5 mb-6 pr-6 border-b border-slate-700/50 pb-6">
                    <div class="w-16 h-16 rounded-2xl bg-slate-800 flex items-center justify-center border border-slate-600 shadow-inner shrink-0 mt-1">
                        <i class="${tool.icon} text-3xl"></i>
                    </div>
                    <div>
                        <h3 class="text-2xl sm:text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-400 mb-2">${tool.title}</h3>

                <!-- 简介内容 -->

                    </h4>
                    <p class="text-slate-300 text-sm sm:text-base leading-relaxed bg-slate-900/50 p-4 sm:p-5 rounded-xl border border-slate-700/50 whitespace-pre-wrap">${tool.longDesc || tool.desc}</p>
                </div>

                <!-- 工具图片预览 -->
                ${imageHtml}

                <!-- 功能特性 -->
                ${featuresHtml}

                <!-- 运行库依赖板块 -->
                ${installHtml}

                <!-- 底部按钮 -->
                <div class="mt-8 flex flex-col sm:flex-row gap-3 pt-6 border-t border-slate-700/50">

                    </a>
                    <a href="${downloadUrl}" target="_blank" class="flex-1 px-5 py-3 rounded-xl bg-blue-600 hover:bg-blue-500 text-white font-medium transition-colors shadow-lg shadow-blue-900/30 flex items-center justify-center text-center">

                </div>
            `;

            // 显示并播放动画
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            // 防止背景滚动
            document.body.style.overflow = 'hidden'; 
            
            // 延迟一点点触发动画，让浏览器有时间处理 display 变化
            setTimeout(() => {
                modalContent.classList.remove('scale-95', 'opacity-0');
                modalContent.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeModal() {
            // 先收起动画
            modalContent.classList.remove('scale-100', 'opacity-100');
            modalContent.classList.add('scale-95', 'opacity-0');
            
            // 动画结束后隐藏 DOM
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                document.body.style.overflow = ''; // 恢复滚动
            }, 300); // 这里的 300 对应 duration-300
        }

        // --- 全屏图片预览 (Lightbox) 逻辑 ---
        const lightboxModal = document.getElementById('lightbox-modal');
        const lightboxImg = document.getElementById('lightbox-img');

        function openLightbox(url) {
            lightboxImg.src = url;
            lightboxModal.classList.remove('hidden');
            lightboxModal.classList.add('flex');
            
            // 延迟一点触发透明度动画，让浏览器渲染
            setTimeout(() => {
                lightboxModal.classList.remove('opacity-0');
                lightboxImg.classList.remove('scale-95');
                lightboxImg.classList.add('scale-100');
            }, 10);
        }

        function closeLightbox() {
            lightboxModal.classList.add('opacity-0');
            lightboxImg.classList.remove('scale-100');
            lightboxImg.classList.add('scale-95');
            
            setTimeout(() => {
                lightboxModal.classList.add('hidden');
                lightboxModal.classList.remove('flex');
                lightboxImg.src = ''; // 清空图片
            }, 300);
        }
    </script>
</body>
</html>
